<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Worker Test Submit</title>
</head>
<body>
  <h2>Forum Worker Test</h2>

  <form id="forumForm">
    <div>
      <label>Name</label><br>
      <input type="text" name="name" value="Test User" required>
    </div>
    <br>
    <div>
      <label>Country</label><br>
      <input type="text" name="country" value="Germany">
    </div>
    <br>
    <div>
      <label>Message</label><br>
      <textarea name="message" required>This is a test submission.</textarea>
    </div>
    <br>
    <button type="submit">Submit Test</button>
  </form>

  <pre id="result"></pre>

  <script>
    document.getElementById("forumForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const form = e.target;
      const payload = {
        name: form.name.value.trim(),
        country: form.country.value.trim(),
        message: form.message.value.trim()
      };

      const res = await fetch("https://floral-math-95fa.maniskul.workers.dev/submit", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const data = await res.json();
      document.getElementById("result").textContent =
        JSON.stringify(data, null, 2);
    });
  </script>
</body>
</html>
